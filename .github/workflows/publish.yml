name: Publish to npm

on:
  push:
    tags:
      - "*"

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/opencode-claude-tailguard
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"
      - run: bun install --frozen-lockfile
      - run: bun lint
      - run: bun tsc
      - run: |
          mkdir -p $HOME/.local/share/opencode
          bun test
      - uses: actions/setup-node@v6
        with:
          node-version: "latest"
      - name: Publish to npm
        run: |
          # 1.2.3, 1.2.3-alpha.0, ...
          VERSION=$(jq -r '.version' package.json)
          # alpha, beta, latest, ...
          TAG=$(echo "$VERSION" | grep -oE 'alpha|beta' || echo "latest")
          npm publish --tag=$TAG --access public
      - name: Release
        uses: softprops/action-gh-release@v3
