name: Publish to npm

on:
  push:
    tags:
      - "*"

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"
      - run: bun install --frozen-lockfile
      - run: bun lint
      - run: bun tsc
      - run: |
          mkdir -p $HOME/.local/share/opencode
          bun test
      - run: bunx npm publish
